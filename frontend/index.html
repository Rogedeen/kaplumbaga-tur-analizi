<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🐢</text></svg>">
<script type="module" src="/src/main.js"></script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-panel {
      background: rgba(2, 22, 29, 0.4);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(139, 209, 232, 0.1);
      border-top-color: rgba(139, 209, 232, 0.25);
    }
    .bioluminescent-glow {
      box-shadow: 0 0 20px rgba(10, 147, 150, 0.15);
    }
    body {
      background: radial-gradient(circle at top right, #003642 0%, #02161d 100%);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen font-body-md selection:bg-secondary/30">
<!-- TopAppBar Section -->
<header class="fixed top-0 z-50 flex justify-between items-center w-full px-6 py-4 bg-cyan-950/40 backdrop-blur-xl border-b border-cyan-400/20 shadow-[0_0_15px_rgba(10,147,150,0.1)]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-cyan-400" data-icon="menu">menu</span>
<h1 class="font-manrope text-lg font-bold tracking-tight text-xl font-extrabold bg-gradient-to-r from-cyan-500 to-teal-400 bg-clip-text text-transparent">Abyssal Vision</h1>
</div>
<!-- Profile removed -->
</header>
<main class="pt-24 pb-32 px-6 max-w-lg mx-auto space-y-8">
<!-- Screen Header -->
<div class="space-y-1">
<p class="font-label-md text-secondary tracking-[0.2em] uppercase">Core Engine</p>
<h2 class="font-headline-md text-on-surface">Marine Analyzer</h2>
</div>
<!-- Upload Area Component -->
<section class="relative group" onclick="document.getElementById('fileInput').click()" style="cursor: pointer;">
<input type="file" id="fileInput" accept="image/*" class="hidden" style="display: none;" onchange="handleFileUpload(event)">
<div class="aspect-square w-full glass-panel rounded-xl border-2 border-dashed border-cyan-400/30 flex flex-col items-center justify-center p-4 transition-all duration-300 group-hover:border-secondary group-hover:shadow-[0_0_30px_rgba(10,147,150,0.2)]">
<!-- Preview Image -->
<div class="absolute inset-4 rounded-lg overflow-hidden">
<img id="previewImage" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" data-alt="Preview" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD4I70I6Hswnn8hjXdNlbYaLPvTYjIBjm3r7_jAw43wr5jTzDW5EsN5NCWMWbBbd_y_rXS0DVjn8dnRh2t3k1yJ7-Ww3gmmGspYSX9pSQILIfOvnzuOo805-OWdqlHOi9lxsiphJUbZpX-lN2RSaXfbjrOiB8uCAhmyJ9MENC0-seJ3yf4MWuc6pngF0w1rHiHGNSWP2iyWAqHz0uNMXZgT8shkQ6XVapeGCY9swzkYZdNqeS5O5UAud5sC839H4V6G0GkcTLqwaOM"/>
</div>
<!-- Overlay Controls (Visible when interacting) -->
<div class="relative z-10 flex flex-col items-center text-center space-y-4 bg-surface/40 backdrop-blur-sm p-8 rounded-xl border border-white/5">
<div class="w-16 h-16 rounded-full bg-secondary-container/40 flex items-center justify-center text-secondary border border-secondary/30 bioluminescent-glow">
<span class="material-symbols-outlined text-4xl" data-icon="add_a_photo">add_a_photo</span>
</div>
<div class="space-y-1">
<p class="font-headline-sm font-bold text-on-primary-container">Tap to Upload</p>
<p class="text-xs text-outline tracking-wider">RAW, JPEG, or TIFF</p>
</div>
</div>
</div>
</section>
<!-- Analysis Result Card -->
<section id="resultCard" style="display: none;" class="glass-panel rounded-xl p-6 bioluminescent-glow space-y-6">
<div class="flex justify-between items-start">
<div class="space-y-1">
<h3 id="speciesName" class="font-headline-md text-secondary leading-tight">Moon Jellyfish</h3>
<p id="scientificName" class="font-label-md text-tertiary italic opacity-70">Aurelia aurita</p>
</div>
<!-- Badge removed -->
</div>
<!-- Confidence Score -->
<div class="space-y-3">
<div class="flex justify-between items-end">
<label id="loadingStatus" class="font-label-md text-outline">Confidence Score</label>
<span id="confidenceText" class="text-xl font-extrabold text-secondary drop-shadow-[0_0_10px_rgba(107,215,218,0.5)]">98%</span>
</div>
<div class="h-2 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div id="confidenceBar" class="h-full w-[98%] bg-gradient-to-r from-secondary to-tertiary shadow-[0_0_15px_rgba(107,215,218,0.6)] transition-all duration-500"></div>
</div>
</div>
<!-- AI Reasoning -->
<div class="space-y-4">
    <div>
        <h4 class="font-label-md text-tertiary tracking-wider uppercase mb-2">AI Analiz Gerekçeleri</h4>
        <ul id="aiReasons" class="space-y-2">
            <!-- Gerekçeler JS ile eklenecek -->
        </ul>
    </div>
    <div>
        <h4 class="font-label-md text-tertiary tracking-wider uppercase mb-2">Sembolik Fiziksel Özellikler</h4>
        <div class="grid grid-cols-2 gap-2 text-sm bg-surface-container/50 p-4 rounded-lg" id="symbolicFeatures">
            <!-- Özellikler JS ile eklenecek -->
        </div>
    </div>
</div>
<!-- Action Button -->
<button class="w-full py-4 rounded-lg bg-gradient-to-r from-secondary-container to-primary-container text-on-primary-fixed font-bold tracking-tight text-sm shadow-[0_4px_20px_rgba(40,160,163,0.3)] hover:scale-[0.98] transition-transform active:opacity-80">
        ARCHIVE SPECIMEN DATA
      </button>
</section>
</main>
<!-- Nav removed -->


</body></html>
