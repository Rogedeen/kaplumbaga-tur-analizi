<script>
  async function handleFileUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    // Show preview
    const previewImage = document.getElementById('previewImage');
    previewImage.src = URL.createObjectURL(file);

    // Reset and show result card
    const resultCard = document.getElementById('resultCard');
    const loadingStatus = document.getElementById('loadingStatus');
    const confidenceText = document.getElementById('confidenceText');
    const confidenceBar = document.getElementById('confidenceBar');
    const speciesName = document.getElementById('speciesName');
    const scientificName = document.getElementById('scientificName');

    resultCard.style.display = 'block';
    loadingStatus.innerText = 'Analyzing...';
    confidenceText.innerText = '-%';
    confidenceBar.style.width = '0%';
    speciesName.innerText = 'Processing';
    scientificName.innerText = 'Please wait';

    const formData = new FormData();
    formData.append('file', file);

    try {
      const response = await fetch('http://localhost:8000/predict', {
        method: 'POST',
        body: formData,
      });

      if (!response.ok) {
        throw new Error('API Error');
      }

      const data = await response.json();
      loadingStatus.innerText = 'Confidence Score';
      const confPercent = Math.round((data.confidence || 0) * 100);
      confidenceText.innerText = confPercent + '%';
      confidenceBar.style.width = confPercent + '%';
      
      speciesName.innerText = data.species || 'Unknown';
      
      // Basic mapping for scientific names
      const scientificMap = {
        'loggerhead': 'Caretta caretta',
        'green': 'Chelonia mydas',
        'leatherback': 'Dermochelys coriacea',
        'hawksbill': 'Eretmochelys imbricata',
        'kemps_ridley': 'Lepidochelys kempii',
        'olive_ridley': 'Lepidochelys olivacea',
        'flatback': 'Natator depressus'
      };
      const key = (data.species || '').toLowerCase().replace(' ', '_');
      scientificName.innerText = scientificMap[key] || 'Sea Turtle';

    } catch (error) {
      console.error(error);
      loadingStatus.innerText = 'Error';
      speciesName.innerText = 'Analysis Failed';
      scientificName.innerText = 'Please ensure backend is running.';
    }
  }
</script>
