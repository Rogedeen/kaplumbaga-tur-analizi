version: '3.8'

services:
  backend:
    build: .
    container_name: turtlevision_api
    ports:
      - "8001:8000"
    volumes:
      - ./src:/app/src
    environment:
      - ENVIRONMENT=production
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: turtlevision_ui
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
